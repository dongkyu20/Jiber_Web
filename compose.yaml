name: jiber

services:
  mysql:
    image: mysql:8.4
    container_name: jiber-mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-jiber}
      MYSQL_USER: ${DB_USER:-jiber}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env for local MySQL}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env for local MySQL}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: jiber-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      BACKEND_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      MODEL_SERVER_BASE_URL: http://model-server:8000
    depends_on:
      mysql:
        condition: service_healthy
      model-server:
        condition: service_healthy

  model-artifacts:
    image: alpine:3.20
    container_name: jiber-model-artifacts
    environment:
      MODEL_DOCUMENTS_URL: ${MODEL_DOCUMENTS_URL:-}
      MODEL_DOCUMENTS_GDRIVE_ID: ${MODEL_DOCUMENTS_GDRIVE_ID:-}
      MODEL_DOCUMENTS_ARCHIVE_TYPE: ${MODEL_DOCUMENTS_ARCHIVE_TYPE:-zip}
      MODEL_PRICE_MODEL_URL: ${MODEL_PRICE_MODEL_URL:-}
      MODEL_PRICE_MODEL_GDRIVE_ID: ${MODEL_PRICE_MODEL_GDRIVE_ID:-}
      MODEL_PRICE_MODEL_FILENAME: ${MODEL_PRICE_MODEL_FILENAME:-price_model.pkl}
      MODEL_DATASET_URL: ${MODEL_DATASET_URL:-}
      MODEL_DATASET_GDRIVE_ID: ${MODEL_DATASET_GDRIVE_ID:-}
      MODEL_DATASET_FILENAME: ${MODEL_DATASET_FILENAME:-dataset.csv}
      MODEL_DATASET_ARCHIVE_TYPE: ${MODEL_DATASET_ARCHIVE_TYPE:-auto}
      MODEL_ASSET_FORCE_DOWNLOAD: ${MODEL_ASSET_FORCE_DOWNLOAD:-false}
    volumes:
      - ./scripts/download-model-assets.sh:/scripts/download-model-assets.sh:ro
      - model-documents:/model-server/documents
      - model-artifacts:/model-server/artifacts
      - model-data:/model-server/data
    command:
      - sh
      - -c
      - apk add --no-cache curl unzip tar && sh /scripts/download-model-assets.sh
    restart: "no"

  model-server:
    build:
      context: ./model-server
    container_name: jiber-model-server
    ports:
      - "${MODEL_SERVER_PORT:-8000}:8000"
    environment:
      MODEL_SERVER_INTERNAL_TOKEN: ${MODEL_SERVER_INTERNAL_TOKEN:-}
      MODEL_VERSION: ${MODEL_VERSION:-}
      MODEL_BASELINE_DATE: ${MODEL_BASELINE_DATE:-}
      MODEL_FEATURE_SET_VERSION: ${MODEL_FEATURE_SET_VERSION:-}
      RAG_DOCS_DIR: /app/documents
      MODEL_ARTIFACT_PATH: /app/artifacts/${MODEL_PRICE_MODEL_FILENAME:-price_model.pkl}
      MODEL_DATASET_PATH: /app/data/${MODEL_DATASET_FILENAME:-dataset.csv}
    volumes:
      - model-documents:/app/documents
      - model-artifacts:/app/artifacts
      - model-data:/app/data
    depends_on:
      model-artifacts:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mysql-data:
  model-documents:
  model-artifacts:
  model-data:
