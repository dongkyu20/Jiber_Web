name: jiber

services:
  mysql:
    image: mysql:8.4
    container_name: jiber-mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-jiber}
      MYSQL_USER: ${DB_USER:-jiber}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env for local MySQL}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env for local MySQL}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: jiber-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      BACKEND_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      MODEL_SERVER_BASE_URL: http://host.docker.internal:8000
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
